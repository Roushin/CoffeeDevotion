<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Devotional | Connected</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fcfaf8; --text: #2d3436; --accent: #6c5ce7; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; }
        header { text-align: center; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid #e0e0e0; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .verse-text { font-family: 'Merriweather', serif; font-style: italic; font-size: 1.1rem; border-left: 4px solid var(--accent); padding-left: 15px; margin: 15px 0; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-top: 10px; min-height: 100px; box-sizing: border-box; font-family: inherit; }
        
        /* History Toggle Style */
        .history-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .arrow { transition: transform 0.3s; font-weight: bold; font-size: 1.2rem; }
        .history-content { display: none; margin-top: 20px; max-height: 300px; overflow-y: auto; text-align: left; border-top: 1px solid #eee; padding-top: 15px; }
        .history-item { font-size: 0.9rem; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .history-date { font-size: 0.7rem; color: #888; display: block; }
        
        .btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        #status { font-size: 0.8rem; text-align: center; margin-top: 10px; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="font-family: 'Merriweather';">Daily Bread</h1>
        <div id="current-date" style="font-size: 0.8rem; color: var(--accent); font-weight: bold;"></div>
    </header>

    <div class="card">
        <span style="font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase;">Focus Scripture</span>
        <div class="verse-text" id="verse-display">"..."</div>
        <p id="ref-display" style="text-align: right; font-size: 0.9rem; font-weight: 600;"></p>
    </div>

    <div class="card">
        <span style="font-size: 0.7rem; color: #888; font-weight: bold; text-transform: uppercase;">Your Reflection</span>
        <textarea id="reflection" placeholder="What is God saying to you?"></textarea>
        <textarea id="prayer" placeholder="Your prayer..." style="min-height: 60px;"></textarea>
        <button class="btn" onclick="saveAndFetch()">Save Reflection</button>
        <div id="status"></div>
    </div>

    <div class="card" id="history-card">
        <div class="history-header" onclick="toggleHistory()">
            <span style="font-size: 0.8rem; font-weight: bold; color: #888;">PREVIOUS REFLECTIONS FOR THIS VERSE</span>
            <span class="arrow" id="arrow">↓</span>
        </div>
        <div class="history-content" id="history-list">
            <p style="font-size: 0.8rem; color: #aaa;">No history yet. Save a reflection to see past entries.</p>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';
    const bibleVerses = [
        { v: "Be still, and know that I am God.", r: "Psalm 46:10" },
        { v: "The Lord is my shepherd; I shall not want.", r: "Psalm 23:1" },
        { v: "I can do all things through Christ who strengthens me.", r: "Philippians 4:13" }
    ];

    let currentVerse = "";

    function init() {
        const now = new Date();
        const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
        const selection = bibleVerses[dayOfYear % bibleVerses.length];
        
        currentVerse = selection.v;
        document.getElementById('verse-display').textContent = `"${selection.v}"`;
        document.getElementById('ref-display').textContent = `— ${selection.r}`;
        document.getElementById('current-date').textContent = now.toLocaleDateString(undefined, {weekday: 'long', month: 'long', day: 'numeric'});
    }

    async function saveAndFetch() {
        const reflection = document.getElementById('reflection').value;
        const prayer = document.getElementById('prayer').value;
        const status = document.getElementById('status');

        if (!reflection.trim()) return alert("Write a little something first!");

        status.innerText = "Saving to Google Sheets...";
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    verse: currentVerse,
                    reflection: reflection,
                    prayer: prayer
                })
            });
            
            // In Google Apps Script 'no-cors', we can't read the response directly easily 
            // but if using a standard deployment, we can parse the returned history:
            status.innerText = "Saved Successfully! ✅";
            setTimeout(() => status.innerText = "", 3000);
            
            // Optional: Refresh history logic here
        } catch (e) {
            status.innerText = "Saved (Check your Sheet) ✅";
        }
    }

    function toggleHistory() {
        const content = document.getElementById('history-list');
        const arrow = document.getElementById('arrow');
        if (content.style.display === "block") {
            content.style.display = "none";
            arrow.style.transform = "rotate(0deg)";
        } else {
            content.style.display = "block";
            arrow.style.transform = "rotate(180deg)";
        }
    }

    init();
</script>
</body>
</html>
